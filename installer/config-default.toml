# Le Voile - Configuration par defaut
# La cle publique Ed25519 du relais DOIT etre remplie avant distribution.
# Elle est injectee au moment du build/release.

[relay]
domain = "levoile.dev"
public_key_ed25519 = "rjgDdexo2SOeNXhdy0fUKAONXeQGAyN2d3ixCeuXOpk="
insecure = true  # dev only — remove when using a valid TLS certificate

[client]
auto_start = true

[http_proxy]
enabled = false
port = 50113
