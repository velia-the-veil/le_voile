# Story 7.4 — CI pipeline : tests, security gates, snapshot signing smoke test.
# Reset cache 2026-05-11 : forcer fresh checkout suite à bascule private→public.
#
# Cette workflow NE fait PAS de release réelle. Par choix délibéré (NFR22g),
# la master key de signature ne vit que sur la machine du mainteneur — jamais
# dans les secrets GitHub. Les vraies releases se font via `make release-sign`
# en local (scripts/release-sign.sh), puis upload manuel ou via `gh release`.
#
# Ce pipeline valide que le chemin de release compile, teste, et produit bien
# des signatures valides via une clé Ed25519 éphémère jetable générée à chaque
# run. Il bloque les PRs qui casseraient le flow de signature.
name: release-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: go test + vet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: "1.26.3"
          cache: true

      # Scopé sur les packages partagés (ADR-08 isolation OS). `./linux/...`
      # et `./windows/...` portent du cgo OS-specific (webview, WFP) qui
      # exige `libwebkit2gtk-4.1-dev` ou wintun.dll — installés uniquement
      # dans les workflows OS-spécifiques. `./cmd/` n'existe plus depuis le
      # refactor 2026-04 qui a migré le code vers linux/ et windows/.
      - name: go vet
        run: go vet ./internal/... ./relay/... ./tools/...

      - name: go test -race
        run: go test -race -count=1 ./internal/... ./relay/... ./tools/...

  security:
    name: security gates (NFR22d/e/f)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: "1.26.3"
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Scope idem `go vet` : packages partagés sans cgo OS-specific.
      - name: govulncheck
        run: govulncheck ./internal/... ./relay/... ./tools/...

      - name: install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      # Exclusions documentées (faux positifs structurels sur codebases bas-niveau) :
      #   - G115 : conversions int→uint16/uint32/byte pour protocol packing
      #            (TCP seq numbers RFC 793, IP Total Length RFC 791, UDP Length
      #            RFC 768, DNS framing 2-byte length prefix, framing tunnel
      #            uint16). Toutes les valeurs source sont bornées par MTU
      #            (≤ 65535). Annotations #nosec individuelles déjà posées
      #            sur les 6 sites principaux ; l'exclude global couvre les
      #            sites résiduels (DNS TCP framing nat_table.go:768-769 et
      #            le second IP Total Length nat_packet.go:215 — même pattern).
      #   - G304 : "potential file inclusion via variable". Tous les sites
      #            sont des paths internes (config, CLI args des outils
      #            mainteneur signpkg/verifypkg/genkey/genregistry, paths
      #            updater calculés à partir de stagingDir contrôlé). Aucun
      #            user input web n'est impliqué. Le warning gosec sur les
      #            paths variables est trop large pour ces use cases.
      #   - G703 : path traversal via taint analysis sur args CLI (signpkg,
      #            verify-registry). Outils mainteneur — l'utilisateur fournit
      #            sciemment le path. Sémantique normale CLI.
      # Pour comparaison : G404 (weak random pour TCP ISN) était une VRAIE
      # issue — fix réel via crypto/rand dans nat_table.go (cf. commit).
      - name: gosec -severity medium
        run: gosec -severity medium -exclude=G115,G304,G703 -quiet ./internal/... ./relay/... ./tools/...

  snapshot-signing:
    name: release snapshot + signature smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: "1.26.3"
          cache: true

      - name: install goreleaser
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          install-only: true
          version: "~> v2"

      - name: run signing smoke test
        run: bash scripts/test-release-signing.sh
        # Aucun secret utilisé — la clé est éphémère jetable.

      - name: upload snapshot artifacts (debug only)
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: goreleaser-dist-failed
          path: |
            dist/**/*
          retention-days: 3
