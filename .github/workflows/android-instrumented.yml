# Story 12.6 — Matrice instrumentee Espresso/UiAutomator sur push main only.
#
# Pourquoi un workflow separe de `release-android.yml` (qui contient deja le
# meme job `instrumented-tests` pour le gating release tag) :
#
#  - Triggers differents : ce workflow s'execute sur chaque push main qui touche
#    `android/**`, donnant un signal regulier sans payer le cout par PR.
#  - PR gating reste `android-audit.yml` (lint + tests JVM + permission-audit
#    + proguard-syntax) — la matrice instrumentee est trop lourde par PR
#    (~20-25 min × 3 API = 60-75 min). On accepte un signal en delta differe.
#
# Duplication acceptee MVP (cf. Story 12.2 + 12.6 Dev Notes) — extract reusable
# `workflow_call` Phase 2 si la maintenance YAML devient un irritant.
name: Android · Instrumented (main)

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-instrumented.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: android-instrumented-main
  cancel-in-progress: true

jobs:
  instrumented-matrix:
    name: Instrumented matrix API ${{ matrix.api-level }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        api-level: [29, 33, 34]
        target: [default]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v3
      - uses: actions/setup-go@v5
        with: { go-version: '1.26.x' }
      - uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build .aar gomobile
        working-directory: android
        run: bash scripts/build-aar.sh

      - name: Sync frontend assets
        working-directory: android
        run: bash scripts/sync-frontend.sh

      - name: Run instrumented tests on API ${{ matrix.api-level }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: android
          script: ./gradlew :app:connectedApkDirectDebugAndroidTest --no-daemon --stacktrace

      - name: Upload Logcat artifact (sur failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-main-api-${{ matrix.api-level }}
          path: android/app/build/outputs/connected_android_test_additional_output/
          if-no-files-found: warn

      - name: Upload test report (toujours)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report-main-api-${{ matrix.api-level }}
          path: android/app/build/reports/androidTests/connected/
          if-no-files-found: warn
