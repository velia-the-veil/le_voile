version: 2

before:
  hooks:
    - go run ./tools/crxgen -key extension/levoile.pem -src extension -out internal/browser/extension_assets/build/levoile.crx -sync-assets internal/browser/extension_assets/src

builds:
  - id: service
    main: ./cmd/client
    binary: levoile-service
    goos: [windows]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: ui
    main: ./cmd/ui
    binary: levoile-ui
    goos: [windows]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.version={{.Version}} -H windowsgui

  - id: ui-linux
    main: ./cmd/ui
    binary: levoile-ui
    goos: [linux]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: relay
    main: ./cmd/relay
    binary: levoile-relay
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  # Story 5.9 — privileged operator CLI shipped on both Linux and Windows.
  # Pure Go (no CGo) — small enough to bundle into every archive without bloat.
  - id: ctl-windows
    main: ./cmd/ctl
    binary: levoile-ctl
    goos: [windows]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: ctl-linux
    main: ./cmd/ctl
    binary: levoile-ctl
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: windows
    builds: [service, ui, ctl-windows]
    name_template: "LeVoile_{{.Version}}_windows_amd64"
    format: zip
    files:
      - LICENSE
      - assets/icons/*.ico
      - installer/config-default.toml

  - id: relay
    builds: [relay]
    name_template: "LeVoile-Relay_{{.Version}}_linux_amd64"
    format: tar.gz
    files:
      - LICENSE
      - deploy/*

  - id: ui-linux
    builds: [ui-linux, ctl-linux]
    name_template: "LeVoile_{{.Version}}_linux_{{.Arch}}"
    format: tar.gz
    files:
      - LICENSE
      - installer/config-default.toml

checksum:
  name_template: "checksums.txt"
