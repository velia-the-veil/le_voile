version: 2

# Fix C7 (audit sécurité) : `signs: artifacts: all` plus bas ne couvre que
# les artefacts produits par goreleaser (archives, binaires, packages,
# checksums). Les `extra_files` sont uploadés tels quels, sans .sig. Pour
# que install.sh arrive avec sa signature détachée dans la release, on
# appelle signpkg ici en amont ; le fichier résultant deploy/install.sh.sig
# est ensuite référencé par extra_files.
#
# `signpkg` doit être dans $PATH — release-sign.sh le construit avant
# d'invoquer goreleaser. En snapshot/CI smoke test (test-release-signing.sh),
# la clé éphémère est écrite à l'emplacement pointé par
# LEVOILE_SIGNING_KEY_PATH pour que cette étape réussisse.
before:
  hooks:
    - bash -c 'signpkg -signing-key="${LEVOILE_SIGNING_KEY_PATH}" deploy/install.sh'

builds:
  - id: service
    main: ./cmd/client
    binary: levoile-service
    goos: [windows]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  # Story 7.2 — service privilégié Linux (systemd via kardianos/service).
  # Pure Go (pas de webview dans le service) → CGO_ENABLED=0 pour un binaire
  # plus reproductible et sans lien runtime C.
  - id: service-linux
    main: ./cmd/client
    binary: levoile-service
    goos: [linux]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: ui
    main: ./cmd/ui
    binary: levoile-ui
    goos: [windows]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.version={{.Version}} -H windowsgui

  - id: ui-linux
    main: ./cmd/ui
    binary: levoile-ui
    goos: [linux]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: relay
    main: ./cmd/relay
    binary: levoile-relay
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  # Story 5.9 — privileged operator CLI shipped on both Linux and Windows.
  # Pure Go (no CGo) — small enough to bundle into every archive without bloat.
  - id: ctl-windows
    main: ./cmd/ctl
    binary: levoile-ctl
    goos: [windows]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: ctl-linux
    main: ./cmd/ctl
    binary: levoile-ctl
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  # Story 7.4 — user-facing verification tool bundled in every archive.
  # Ships as levoile-verify.* so users can confirm artifact integrity
  # without extra tooling (pure Go, no CGo).
  - id: verify-windows
    main: ./cmd/verifypkg
    binary: levoile-verify
    goos: [windows]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: verify-linux
    main: ./cmd/verifypkg
    binary: levoile-verify
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: windows
    # Story 7.4 — verify-windows bundled so users can validate signatures without openssl.
    ids: [service, ui, ctl-windows, verify-windows]
    name_template: "LeVoile_{{.Version}}_windows_amd64"
    formats: [zip]
    files:
      - LICENSE
      - assets/icons/*.ico
      - installer/config-default.toml
      - src: docs/keys/levoile-release.pub
        dst: keys/levoile-release.pub
      - src: docs/keys/levoile-release.pub.pem
        dst: keys/levoile-release.pub.pem

  - id: relay
    ids: [relay]
    name_template: "LeVoile-Relay_{{.Version}}_linux_amd64"
    formats: [tar.gz]
    files:
      - LICENSE
      - deploy/*

  # Story 7.2 — archive tar.gz Linux : inclut aussi le service (sinon l'archive
  # tar.gz seule ne permet pas une install manuelle sans passer par les paquets).
  # Les paquets .deb/.rpm/.apk restent la voie recommandée.
  # Story 7.4 — verify-linux + clé publique bundled.
  - id: ui-linux
    ids: [service-linux, ui-linux, ctl-linux, verify-linux]
    name_template: "LeVoile_{{.Version}}_linux_{{.Arch}}"
    formats: [tar.gz]
    files:
      - LICENSE
      - installer/config-default.toml
      - src: docs/keys/levoile-release.pub
        dst: keys/levoile-release.pub
      - src: docs/keys/levoile-release.pub.pem
        dst: keys/levoile-release.pub.pem

# Story 7.2 — paquets natifs Linux .deb/.rpm/.apk via nfpm intégré à GoReleaser.
# Une seule définition → 3 formats × 2 architectures (amd64 + arm64). Les overrides
# par format gèrent les noms de paquets différents selon la distro (ex: webkit2gtk4.1
# sur Fedora vs libwebkit2gtk-6.0-0 sur Debian).
# Cf. _bmad-output/implementation-artifacts/7-2-paquets-linux-deb-rpm-apk-via-goreleaser-nfpm.md
nfpms:
  - id: levoile
    package_name: levoile
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: "Velia the Veil"
    homepage: "https://github.com/velia-the-veil/le_voile"
    maintainer: "Velia the Veil <contact@levoile.dev>"
    description: |-
      Le Voile VPN — client desktop tunnel QUIC/HTTP3 via Cloudflare.
      Capture trafic L3 machine-wide (TUN), kill switch firewall OS-level (nftables),
      UI tray + webview, service systemd privilégié user=levoile avec capabilities
      CAP_NET_ADMIN + CAP_NET_RAW via AmbientCapabilities.
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk
    ids:
      - service-linux
      - ui-linux
      - ctl-linux
    section: net
    priority: optional
    bindir: /usr/bin
    contents:
      # Unit systemd system (service privilégié) — story 7.2
      - src: packaging/systemd/levoile.service
        dst: /usr/lib/systemd/system/levoile.service
        file_info:
          mode: 0644
      # Unit systemd user (tray + webview) — story 5.7
      - src: packaging/systemd/user/levoile-ui.service
        dst: /usr/lib/systemd/user/levoile-ui.service
        file_info:
          mode: 0644
      # Autostart XDG → déclenche systemctl --user start levoile-ui.service — story 5.7
      - src: packaging/desktop/levoile-autostart.desktop
        dst: /etc/xdg/autostart/levoile-autostart.desktop
        file_info:
          mode: 0644
      # Entrée menu applications — story 7.2
      - src: packaging/desktop/levoile.desktop
        dst: /usr/share/applications/levoile.desktop
        file_info:
          mode: 0644
      # Skeleton config (type: config → géré par le package manager sur upgrade)
      - src: packaging/etc/config.toml
        dst: /etc/levoile/config.toml
        type: config|noreplace
        file_info:
          mode: 0644
      # Règle polkit : le user système `levoile` doit pouvoir piloter
      # systemd-resolved (resolvectl dns ...) sans auth interactive. Sans ça,
      # le service crash au premier `dns set resolver` avec EACCES via D-Bus.
      - src: packaging/polkit/49-levoile-resolved.rules
        dst: /etc/polkit-1/rules.d/49-levoile-resolved.rules
        file_info:
          mode: 0644
      # Icônes XDG hicolor multi-tailles
      - src: packaging/icons/hicolor/16x16/apps/levoile.png
        dst: /usr/share/icons/hicolor/16x16/apps/levoile.png
      - src: packaging/icons/hicolor/32x32/apps/levoile.png
        dst: /usr/share/icons/hicolor/32x32/apps/levoile.png
      - src: packaging/icons/hicolor/48x48/apps/levoile.png
        dst: /usr/share/icons/hicolor/48x48/apps/levoile.png
      - src: packaging/icons/hicolor/64x64/apps/levoile.png
        dst: /usr/share/icons/hicolor/64x64/apps/levoile.png
      - src: packaging/icons/hicolor/128x128/apps/levoile.png
        dst: /usr/share/icons/hicolor/128x128/apps/levoile.png
      - src: packaging/icons/hicolor/256x256/apps/levoile.png
        dst: /usr/share/icons/hicolor/256x256/apps/levoile.png
      # Licence + README (conservés par convention Debian/FHS)
      - src: LICENSE
        dst: /usr/share/doc/levoile/LICENSE
      - src: README.md
        dst: /usr/share/doc/levoile/README.md
    # Scripts — les mêmes scripts sont exécutés pour les 3 formats (pattern unifié
    # via guards internes `command -v systemctl` / `|| true`).
    scripts:
      preinstall: packaging/scripts/preinstall.sh
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
      postremove: packaging/scripts/postremove.sh
    overrides:
      deb:
        dependencies:
          - libwebkit2gtk-6.0-0 | libwebkit2gtk-4.1-0
          - libayatana-appindicator3-1
          - nftables
          - iproute2
      rpm:
        dependencies:
          - webkit2gtk4.1
          - libayatana-appindicator-gtk3
          - nftables
          - iproute
      apk:
        dependencies:
          - webkit2gtk-4.1
          - libayatana-appindicator
          - nftables
          - iproute2
    rpm:
      group: Applications/Internet
      compression: xz

checksum:
  name_template: "checksums.txt"

# Story 7.4 — signature Ed25519 détachée de tous les artefacts de distribution.
# Le hook invoque cmd/signpkg qui écrit <artifact>.sig (64 octets bruts).
# Les .sig sont uploadés avec les artefacts via release.extra_files.
#
# LEVOILE_SIGNING_KEY_PATH doit pointer vers le fichier privé (mode 0600) —
# jamais dans un secret CI (NFR22g). Voir docs/release-signing.md.
signs:
  - id: ed25519-master
    cmd: signpkg
    args:
      - "-signing-key={{ .Env.LEVOILE_SIGNING_KEY_PATH }}"
      - "${artifact}"
    signature: "${artifact}.sig"
    artifacts: all

# Story 7.4 — clé publique release + PEM uploadés comme assets de la GitHub Release.
# Les utilisateurs peuvent télécharger la clé pour vérifier via openssl ou
# levoile-verify sans dépendre du contenu du repo.
#
# Fix C7 (audit sécurité) : install.sh du relais VPS est aussi inclus dans
# les release assets. Co-uploadé avec install.sh.sig (signé par le hook
# ci-dessous via artifacts: all). L'opérateur de relais doit curl les deux,
# vérifier la sig avec levoile-verify, puis exécuter — remplace le flow
# précédent "scp + ssh sudo bash" vulnérable au MITM.
release:
  extra_files:
    - glob: docs/keys/levoile-release.pub
    - glob: docs/keys/levoile-release.pub.pem
    - glob: deploy/install.sh
    - glob: deploy/install.sh.sig
