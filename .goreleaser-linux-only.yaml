version: 2

# Stripped variant of .goreleaser.yaml for local Linux/amd64 .deb builds only.
# Drops: Windows targets, arm64, relay, signing hooks, archive variants we
# don't need. Mirrors the nfpm block from .goreleaser.yaml verbatim so the
# resulting .deb has identical layout / scripts / dependencies as a real
# release build.
#
# Usage:
#   goreleaser release -f .goreleaser-linux-only.yaml \
#     --snapshot --clean --skip=publish

builds:
  - id: service-linux
    main: ./cmd/client
    binary: levoile-service
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: ui-linux
    main: ./cmd/ui
    binary: levoile-ui
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: ctl-linux
    main: ./cmd/ctl
    binary: levoile-ctl
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: verify-linux
    main: ./cmd/verifypkg
    binary: levoile-verify
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: linux
    ids: [service-linux, ui-linux, ctl-linux, verify-linux]
    name_template: "LeVoile_{{.Version}}_linux_{{.Arch}}"
    formats: [tar.gz]
    files:
      - LICENSE
      - installer/config-default.toml
      - src: docs/keys/levoile-release.pub
        dst: keys/levoile-release.pub
      - src: docs/keys/levoile-release.pub.pem
        dst: keys/levoile-release.pub.pem

nfpms:
  - id: levoile
    package_name: levoile
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: "Velia the Veil"
    homepage: "https://github.com/velia-the-veil/le_voile"
    maintainer: "Velia the Veil <contact@levoile.dev>"
    description: |-
      Le Voile VPN — client desktop tunnel QUIC/HTTP3 via Cloudflare.
      Capture trafic L3 machine-wide (TUN), kill switch firewall OS-level (nftables),
      UI tray + webview, service systemd privilégié user=levoile avec capabilities
      CAP_NET_ADMIN + CAP_NET_RAW via AmbientCapabilities.
    license: "MIT"
    formats:
      - deb
    ids:
      - service-linux
      - ui-linux
      - ctl-linux
    section: net
    priority: optional
    bindir: /usr/bin
    contents:
      - src: packaging/systemd/levoile.service
        dst: /usr/lib/systemd/system/levoile.service
        file_info:
          mode: 0644
      - src: packaging/systemd/user/levoile-ui.service
        dst: /usr/lib/systemd/user/levoile-ui.service
        file_info:
          mode: 0644
      - src: packaging/desktop/levoile-autostart.desktop
        dst: /etc/xdg/autostart/levoile-autostart.desktop
        file_info:
          mode: 0644
      - src: packaging/desktop/levoile.desktop
        dst: /usr/share/applications/levoile.desktop
        file_info:
          mode: 0644
      - src: packaging/etc/config.toml
        dst: /etc/levoile/config.toml
        type: config|noreplace
        file_info:
          mode: 0644
      # Règle polkit : autorise le user système `levoile` à appeler resolvectl
      # via D-Bus. Sans elle, dnsMgr.SetResolver échoue avec « Interactive
      # authentication required » et tunCleanup démonte tout le L3 stack.
      - src: packaging/polkit/49-levoile-resolved.rules
        dst: /etc/polkit-1/rules.d/49-levoile-resolved.rules
        file_info:
          mode: 0644
      - src: packaging/icons/hicolor/16x16/apps/levoile.png
        dst: /usr/share/icons/hicolor/16x16/apps/levoile.png
      - src: packaging/icons/hicolor/32x32/apps/levoile.png
        dst: /usr/share/icons/hicolor/32x32/apps/levoile.png
      - src: packaging/icons/hicolor/48x48/apps/levoile.png
        dst: /usr/share/icons/hicolor/48x48/apps/levoile.png
      - src: packaging/icons/hicolor/64x64/apps/levoile.png
        dst: /usr/share/icons/hicolor/64x64/apps/levoile.png
      - src: packaging/icons/hicolor/128x128/apps/levoile.png
        dst: /usr/share/icons/hicolor/128x128/apps/levoile.png
      - src: packaging/icons/hicolor/256x256/apps/levoile.png
        dst: /usr/share/icons/hicolor/256x256/apps/levoile.png
      - src: LICENSE
        dst: /usr/share/doc/levoile/LICENSE
      - src: README.md
        dst: /usr/share/doc/levoile/README.md
    scripts:
      preinstall: packaging/scripts/preinstall.sh
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
      postremove: packaging/scripts/postremove.sh
    overrides:
      deb:
        dependencies:
          - libwebkit2gtk-6.0-0 | libwebkit2gtk-4.1-0
          - libayatana-appindicator3-1
          - nftables
          - iproute2

checksum:
  name_template: "checksums.txt"
