version: 2

# Autonomous goreleaser config for the Linux tier.
#
# Usage (from this directory):
#   cd linux
#   goreleaser release --snapshot --clean --config .goreleaser.yaml --skip=publish
#
# Or for a real release (requires LEVOILE_SIGNING_KEY_PATH + git tag like
# linux-vX.Y.Z):
#   cd linux && bash scripts/release-sign.sh
#
# All paths in this file are relative to linux/ (where goreleaser is invoked).
# `signpkg` must be in $PATH — linux/scripts/release-sign.sh builds it from
# tools/signpkg before invoking goreleaser.
#
# Tag convention: `linux-vX.Y.Z` (enforced by release-sign.sh). The "linux-"
# prefix is stripped before invoking goreleaser by exporting
# GORELEASER_CURRENT_TAG=vX.Y.Z (see linux/scripts/release-sign.sh) — this
# way {{.Version}} resolves to a clean semver and artefacts are named
# `levoile_X.Y.Z_amd64.deb` instead of `levoile_linux-vX.Y.Z_amd64.deb`.
# (goreleaser v2's `monorepo.tag_prefix` does not strip for version parsing,
#  so we normalize at the caller layer.)

builds:
  # Service privilégié systemd (kardianos/service). CGO_ENABLED=0 pour un
  # binaire reproductible sans lien runtime C.
  - id: service
    main: ./cmd/client
    binary: levoile-service
    goos: [linux]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: ui
    main: ./cmd/ui
    binary: levoile-ui
    goos: [linux]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: ctl
    main: ./cmd/ctl
    binary: levoile-ctl
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  # User-facing signature verification tool (story 7.4). Source lives at
  # repo root (../tools/verifypkg) — shared with windows/ and relay/ tiers.
  - id: verify
    dir: ..
    main: ./tools/verifypkg
    binary: levoile-verify
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: linux
    ids: [service, ui, ctl, verify]
    name_template: "LeVoile_{{.Version}}_linux_{{.Arch}}"
    formats: [tar.gz]
    files:
      - ../LICENSE
      - src: ../docs/keys/levoile-release.pub
        dst: keys/levoile-release.pub
      - src: ../docs/keys/levoile-release.pub.pem
        dst: keys/levoile-release.pub.pem

# Story 7.2 — paquets natifs Linux .deb/.rpm/.apk via nfpm intégré à goreleaser.
nfpms:
  - id: levoile
    package_name: levoile
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: "Velia the Veil"
    homepage: "https://github.com/velia-the-veil/le_voile"
    maintainer: "Velia the Veil <contact@levoile.dev>"
    description: |-
      Le Voile VPN — client desktop tunnel QUIC/HTTP3 via Cloudflare.
      Capture trafic L3 machine-wide (TUN), kill switch firewall OS-level (nftables),
      UI tray + webview, service systemd privilégié user=levoile avec capabilities
      CAP_NET_ADMIN + CAP_NET_RAW via AmbientCapabilities.
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk
    ids:
      - service
      - ui
      - ctl
    section: net
    priority: optional
    bindir: /usr/bin
    contents:
      - src: packaging/systemd/levoile.service
        dst: /usr/lib/systemd/system/levoile.service
        file_info:
          mode: 0644
      - src: packaging/systemd/user/levoile-ui.service
        dst: /usr/lib/systemd/user/levoile-ui.service
        file_info:
          mode: 0644
      - src: packaging/desktop/levoile-autostart.desktop
        dst: /etc/xdg/autostart/levoile-autostart.desktop
        file_info:
          mode: 0644
      - src: packaging/desktop/levoile.desktop
        dst: /usr/share/applications/levoile.desktop
        file_info:
          mode: 0644
      - src: packaging/etc/config.toml
        dst: /etc/levoile/config.toml
        type: config|noreplace
        file_info:
          mode: 0644
      - src: packaging/polkit/49-levoile-resolved.rules
        dst: /etc/polkit-1/rules.d/49-levoile-resolved.rules
        file_info:
          mode: 0644
      - src: packaging/icons/hicolor/16x16/apps/levoile.png
        dst: /usr/share/icons/hicolor/16x16/apps/levoile.png
      - src: packaging/icons/hicolor/32x32/apps/levoile.png
        dst: /usr/share/icons/hicolor/32x32/apps/levoile.png
      - src: packaging/icons/hicolor/48x48/apps/levoile.png
        dst: /usr/share/icons/hicolor/48x48/apps/levoile.png
      - src: packaging/icons/hicolor/64x64/apps/levoile.png
        dst: /usr/share/icons/hicolor/64x64/apps/levoile.png
      - src: packaging/icons/hicolor/128x128/apps/levoile.png
        dst: /usr/share/icons/hicolor/128x128/apps/levoile.png
      - src: packaging/icons/hicolor/256x256/apps/levoile.png
        dst: /usr/share/icons/hicolor/256x256/apps/levoile.png
      - src: ../LICENSE
        dst: /usr/share/doc/levoile/LICENSE
      - src: ../README.md
        dst: /usr/share/doc/levoile/README.md
    scripts:
      preinstall: packaging/scripts/preinstall.sh
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
      postremove: packaging/scripts/postremove.sh
    overrides:
      deb:
        dependencies:
          - libwebkit2gtk-6.0-0 | libwebkit2gtk-4.1-0
          - libayatana-appindicator3-1
          - nftables
          - iproute2
      rpm:
        dependencies:
          - webkit2gtk4.1
          - libayatana-appindicator-gtk3
          - nftables
          - iproute
      apk:
        dependencies:
          - webkit2gtk-4.1
          - libayatana-appindicator
          - nftables
          - iproute2
    rpm:
      group: Applications/Internet
      compression: xz

checksum:
  name_template: "checksums.txt"

# Story 7.4 — signature Ed25519 détachée de tous les artefacts Linux.
signs:
  - id: ed25519-master
    cmd: signpkg
    args:
      - "-signing-key={{ .Env.LEVOILE_SIGNING_KEY_PATH }}"
      - "${artifact}"
    signature: "${artifact}.sig"
    artifacts: all

release:
  extra_files:
    - glob: ../docs/keys/levoile-release.pub
    - glob: ../docs/keys/levoile-release.pub.pem
