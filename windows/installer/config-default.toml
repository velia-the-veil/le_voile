# Le Voile - Configuration par defaut
# La cle publique Ed25519 du relais DOIT etre remplie avant distribution.
# Elle est injectee au moment du build/release.

[relay]
domain = "relay.levoile.dev"
public_key_ed25519 = "rjgDdexo2SOeNXhdy0fUKAONXeQGAyN2d3ixCeuXOpk="

[client]
auto_start = true

[blocklist]
enabled = true

[http_proxy]
enabled = true
port = 50113

[registry]
enabled = true
url = "https://relay.levoile.dev"
master_public_key = "rjgDdexo2SOeNXhdy0fUKAONXeQGAyN2d3ixCeuXOpk="
bootstrap_doh_enabled = true

[browser_policies]
enabled = true

# Capture L3 machine-wide via interface virtuelle (Wintun sur Windows, TUN sur
# Linux). Doit etre true en prod, sinon le service tombe en mode proxy-HTTP-only
# (seul le browser passe par le VPN, PowerShell / jeux / Steam fuient direct).
[tun]
enabled = true
name = "levoile0"
mtu = 1420

# Kill-switch firewall OS-level (WFP Windows, nftables Linux). Active au
# Connect() pour bloquer tout le trafic sortant sauf TUN + IP relais.
# Doit etre true en prod pour tenir les garanties NFR9b.
[firewall]
enable_killswitch = true
allow_ipv6_leak = false
